<tr id="tx-row-{{ txn['id'] }}" data-txn-id="{{ txn['id'] }}"{% if txn.get('cat_name') in ('Uncategorized Expense', 'Uncategorized Income') %} class="table-info"{% endif %}>
    <td class="ps-3 small text-nowrap">{{ txn["txn_date"] }}</td>
    <td class="small" style="white-space:normal">
        <div>{{ txn["narration"] or "\u2014" }}</div>
        {% if txn.get("reference") %}
        <div class="small text-muted mt-1">(REF: {{ txn["reference"] }})</div>
        {% endif %}
    </td>
    <td class="tx-cat-cell">
        <div class="kuku-search-select" data-txn-id="{{ txn['id'] }}" data-original="{{ txn.get('category_id') or '' }}" data-selected="{{ txn.get('category_id') or '' }}">
            <input type="text" class="form-control form-control-sm ss-display"
                   placeholder="Search category…" autocomplete="off">
            <div class="ss-dropdown" role="listbox"></div>
        </div>
    </td>
    <td class="text-end text-danger small">{{ "{:,.2f}".format(txn["debit"]) if txn["debit"] else "" }}</td>
    <td class="text-end text-success small">{{ "{:,.2f}".format(txn["credit"]) if txn["credit"] else "" }}</td>
    <td class="text-end small">{{ "{:,.2f}".format(txn["balance"]) }}</td>
    <td class="text-end pe-3">
        <button class="btn btn-outline-secondary btn-sm py-0 px-1"
                hx-get="{{ root_path }}/banks/transactions/{{ txn['id'] }}/edit"
                hx-target="#tx-row-{{ txn['id'] }}"
                hx-swap="outerHTML"
                title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger kuku-del-btn btn-sm py-0 px-1"
                data-url="{{ root_path }}/banks/transactions/{{ txn['id'] }}"
                data-title="Delete Transaction"
                data-detail="{{ txn['txn_date'] }} — {{ (txn['narration'] or '')[:50] }}"
                data-event="txDeleted"
                title="Delete"><i class="bi bi-trash"></i></button>
    </td>
</tr>
