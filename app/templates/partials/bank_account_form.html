<div class="card border-0 shadow-sm mb-3" id="account-form-card">
    <div class="card-header d-flex justify-content-between align-items-center py-2">
        <strong class="small text-uppercase">{{ "Edit Bank Account" if account else "Add Bank Account" }}</strong>
        <button type="button" class="btn-close btn-close-white" aria-label="Close"
                hx-get="/banks/accounts/clear-form"
                hx-target="#account-form-card"
                hx-swap="outerHTML"></button>
    </div>
    <div class="card-body">
        {% if errors %}
        <div class="alert alert-danger py-2 small mb-3">
            {% for err in errors %}{{ err }}<br>{% endfor %}
        </div>
        {% endif %}
        {% if account %}
        <form hx-post="/banks/accounts/{{ account['id'] }}/update"
              hx-target="#hx-account-list"
              hx-swap="outerHTML"
              hx-on::after-request='var el=document.getElementById("account-form-card"); if(el) { var listEl=document.getElementById("hx-account-list"); if (listEl && !listEl.querySelector("form")) { el.outerHTML="<div id=\"account-form-card\"></div>" } }'>
        {% else %}
        <form hx-post="/banks/accounts"
              hx-target="#hx-account-list"
              hx-swap="outerHTML"
              hx-on::after-request='var el=document.getElementById("account-form-card"); if(el) { var listEl=document.getElementById("hx-account-list"); if (listEl && !listEl.querySelector("form")) { el.outerHTML="<div id=\"account-form-card\"></div>" } }'>
        {% endif %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Bank Name</label>
                    <input name="bank_name" class="form-control form-control-sm"
                           value="{{ account['bank_name'] if account else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Account Name</label>
                    <input name="account_name" class="form-control form-control-sm"
                           value="{{ account['account_name'] if account else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Account Number</label>
                    <input name="account_number" class="form-control form-control-sm"
                           value="{{ account['account_number'] if account else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">IFSC Code</label>
                    <input name="ifsc_code" class="form-control form-control-sm"
                           value="{{ account['ifsc_code'] if account else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Branch <span class="text-muted fw-normal">(optional)</span></label>
                    <input name="branch_name" class="form-control form-control-sm"
                           value="{{ account['branch_name'] if account else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label small fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
                    <textarea name="notes" class="form-control form-control-sm" rows="2">{{ account['notes'] if account else '' }}</textarea>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-check-lg me-1"></i> {{ "Update" if account else "Save" }}
                </button>
                <button type="button" class="btn btn-secondary btn-sm"
                        hx-get="/banks/accounts/clear-form"
                        hx-target="#account-form-card"
                        hx-swap="outerHTML">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>
