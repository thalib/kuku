<form hx-post="/banks/transactions/import/preview"
      hx-encoding="multipart/form-data"
      hx-target="#import-modal-body"
      hx-swap="innerHTML"
      enctype="multipart/form-data">
    <input type="hidden" name="account_id" value="{{ account_id }}">
    <span class="modal-title-label d-none">Import Transactions</span>
    <div class="row g-2 align-items-end">
        <div class="col-md-7">
            <label class="form-label small fw-semibold">Select CSV or Excel file</label>
            <input type="file" name="file" class="form-control form-control-sm" accept=".csv,.xls,.xlsx" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-eye me-1"></i> Preview</button>
        </div>
    </div>
    <div class="form-text small mt-2">Supported: CSV (HDFC, IDBI, or similar formats), XLS, XLSX. File is parsed and previewed before importing.</div>
</form>
