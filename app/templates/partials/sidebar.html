<div class="app-layout__sidebar-shell h-100 d-flex flex-column" id="kukuSidebarShell">
    <div class="app-sidebar bg-dark text-white h-100 d-flex flex-column border-end border-secondary-subtle">
        <nav class="d-flex flex-column h-100">
            <div class="flex-grow-1 overflow-auto px-2 py-3">
                {% for group in nav_groups %}
                <div class="mb-3">
                    {% if group["label"] %}
                    <div class="px-2 mb-2 text-uppercase small fw-semibold text-secondary">{{ group["label"] }}</div>
                    {% endif %}
                    <div class="d-grid gap-1">
                        {% for item in group["links"] %}
                        <a href="{{ item["url"] }}"
                           class="sidebar-link nav-link text-white d-flex align-items-center justify-content-between gap-2 px-2 py-2 rounded flex-grow-1 {% if item["active"] %}bg-primary{% endif %}">
                            <span class="d-flex align-items-center gap-2 text-truncate">
                                <i class="bi flex-shrink-0 {{ item["icon"] }}"></i>
                                <span class="text-truncate">{{ item["name"] }}</span>
                            </span>
                        </a>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="px-3 py-3 small text-secondary border-top border-secondary-subtle">
                <i class="bi bi-moon-stars-fill me-1"></i> {{ app_name }}
            </div>
        </nav>
    </div>
</div>
