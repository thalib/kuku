<div class="app-sidebar-wrap bg-dark border-end border-secondary-subtle h-100" id="sidebarWrap">
    <div class="app-sidebar bg-dark d-flex flex-column">
        <nav class="d-flex flex-column overflow-auto px-2 py-3 flex-grow-1">
            {% for group in nav_groups %}
                {% if group["label"] %}
                <div class="mb-3">
                    <div class="px-2 mb-1 text-uppercase small fw-semibold text-secondary">{{ group["label"] }}</div>
                    <div class="d-grid gap-1">
                        {% for item in group["links"] %}
                        <a href="{{ root_path }}{{ item["url"] }}"
                           class="app-sidebar-link nav-link text-white d-flex align-items-center gap-2 px-2 py-2 rounded {% if item["active"] %}bg-primary{% endif %}">
                            <i class="bi flex-shrink-0 {{ item["icon"] }}"></i>
                            <span class="text-truncate">{{ item["name"] }}</span>
                        </a>
                        {% endfor %}
                    </div>
                </div>
                {% else %}
                <div class="mb-3">
                    <div class="d-grid gap-1">
                        {% for item in group["links"] %}
                        <a href="{{ root_path }}{{ item["url"] }}"
                           class="app-sidebar-link nav-link text-white d-flex align-items-center gap-2 px-2 py-2 rounded {% if item["active"] %}bg-primary{% endif %}">
                            <i class="bi flex-shrink-0 {{ item["icon"] }}"></i>
                            <span class="text-truncate">{{ item["name"] }}</span>
                        </a>
                        {% endfor %}
                    </div>
                </div>
                {% endif %}
            {% endfor %}
        </nav>
        <div class="px-3 py-3 small text-secondary border-top border-secondary-subtle flex-shrink-0">
            <i class="bi bi-moon-stars-fill me-1"></i> {{ app_name }}
        </div>
    </div>
</div>
