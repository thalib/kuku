<div class="card border-0 shadow-sm mb-3" id="category-form-card">
    <div class="card-header d-flex justify-content-between align-items-center py-2">
        <strong class="small text-uppercase">{{ "Edit Category" if category else "Add Category" }}</strong>
        <button type="button" class="btn-close btn-close-white" aria-label="Close"
                hx-get="/banks/categories/clear-form"
                hx-target="#category-form-card"
                hx-swap="outerHTML"></button>
    </div>
    <div class="card-body">
        {% if errors %}
        <div class="alert alert-danger py-2 small mb-3">
            {% for err in errors %}{{ err }}<br>{% endfor %}
        </div>
        {% endif %}
        {% if category %}
        <form hx-post="/banks/categories/{{ category['id'] }}/update"
              hx-target="#hx-category-list"
              hx-swap="outerHTML"
              hx-on::after-request='var el=document.getElementById("category-form-card"); if(el) { var listEl=document.getElementById("hx-category-list"); if (listEl && !listEl.querySelector("form")) { el.outerHTML="<div id=\"category-form-card\"></div>" } }'>
        {% else %}
        <form hx-post="/banks/categories"
              hx-target="#hx-category-list"
              hx-swap="outerHTML"
              hx-on::after-request='var el=document.getElementById("category-form-card"); if(el) { var listEl=document.getElementById("hx-category-list"); if (listEl && !listEl.querySelector("form")) { el.outerHTML="<div id=\"category-form-card\"></div>" } }'>
        {% endif %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Category Name</label>
                    <input name="name" class="form-control form-control-sm"
                           value="{{ form_name if form_name is defined else (category['name'] if category else '') }}"
                           required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Type</label>
                    <select name="type" class="form-select form-select-sm" required>
                        {% for t in category_types %}
<option value="{{ t }}"
                            {% if category and category['type'] == t %} selected
                            {% elif form_type is defined and form_type == t %} selected
                            {% endif %}>
                            {{ t }}
                        </option>
                        {% endfor %}
                     </select>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
                    <input name="description" class="form-control form-control-sm"
                           value="{{ form_description if form_description is defined else (category['description'] if category else '') }}">
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-check-lg me-1"></i> {{ "Update" if category else "Save" }}
                </button>
                <button type="button" class="btn btn-secondary btn-sm"
                        hx-get="/banks/categories/clear-form"
                        hx-target="#category-form-card"
                        hx-swap="outerHTML">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>
