<div id="hx-account-list">
    {% if accounts %}
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Bank</th>
                        <th scope="col">A/C Name</th>
                        <th scope="col">A/C Number</th>
                        <th scope="col">IFSC</th>
                        <th scope="col">Status</th>
                        <th scope="col" class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                {% for a in accounts %}
                    <tr>
                        <td class="fw-semibold">{{ a["bank_name"] }}</td>
                        <td>{{ a["account_name"] }}</td>
                        <td><code class="small">{{ a["account_number"] }}</code></td>
                        <td class="small">{{ a["ifsc_code"] }}</td>
                        <td>
                            <form class="d-inline"
                                  hx-post="/banks/accounts/{{ a['id'] }}/toggle"
                                  hx-target="#hx-account-list"
                                  hx-swap="outerHTML">
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           {% if a["is_active"] %}checked{% endif %}>
                                    <label class="form-check-label small">
                                        {{ "Active" if a["is_active"] else "Inactive" }}
                                    </label>
                                </div>
                            </form>
                        </td>
                        <td class="text-end">
                            <div class="btn-group btn-group-sm" role="group">
                                <button class="btn btn-outline-secondary"
                                        hx-get="/banks/accounts/{{ a['id'] }}/edit"
                                        hx-target="#account-form-card"
                                        hx-swap="innerHTML">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-danger"
                                        hx-delete="/banks/accounts/{{ a['id'] }}"
                                        hx-confirm="Delete this bank account?"
                                        hx-target="#hx-account-list"
                                        hx-swap="outerHTML">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    {% else %}
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center text-muted py-5">
            <i class="bi bi-bank fs-1 d-block mb-2"></i>
            <p class="mb-0">No bank accounts yet. Add one to get started.</p>
        </div>
    </div>
    {% endif %}
</div>
