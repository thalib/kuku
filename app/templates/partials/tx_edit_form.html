<tr id="tx-edit-{{ txn['id'] }}">
    <td class="ps-3"><input id="etd-date" name="txn_date" type="date" class="form-control form-control-sm" value="{{ txn['txn_date'] }}" required></td>
    <td>
        <textarea id="etd-narr" name="narration" class="form-control form-control-sm" rows="2">{{ txn['narration'] or '' }}</textarea>
        <input id="etd-ref" name="reference" class="form-control form-control-sm mt-1" placeholder="Reference" value="{{ txn['reference'] or '' }}">
    </td>
    <td>
        <select name="category_id" class="form-select form-select-sm">
            <option value="" disabled {% if not txn.get("category_id") %}selected{% endif %}>Select…</option>
            {% for type_name in ("Income", "Expense", "Asset", "Liability", "Equity", "Transfer") %}
                {% set type_cats = [] %}
                {% for c in categories %}{% if c["type"] == type_name %}{% set _ = type_cats.append(c) %}{% endif %}{% endfor %}
                {% if type_cats %}
                <optgroup label="{{ type_name }}">
                {% for c in type_cats %}
                    <option value="{{ c['id'] }}" {% if txn.get("category_id") == c["id"] %}selected{% endif %}>{{ c["name"] }}</option>
                {% endfor %}
                </optgroup>
                {% endif %}
            {% endfor %}
        </select>
    </td>
    <td><input name="debit" type="number" step="0.01" class="form-control form-control-sm text-end" value="{{ txn['debit'] }}"></td>
    <td><input name="credit" type="number" step="0.01" class="form-control form-control-sm text-end" value="{{ txn['credit'] }}"></td>
    <td><input name="balance" type="number" step="0.01" class="form-control form-control-sm text-end" value="{{ txn['balance'] }}"></td>
    <td class="text-end pe-3">
        <button class="btn btn-success btn-sm py-0 px-1" title="Save"
                hx-post="{{ root_path }}/banks/transactions/{{ txn['id'] }}/update"
                hx-include="#tx-edit-{{ txn['id'] }} input, #tx-edit-{{ txn['id'] }} textarea, #tx-edit-{{ txn['id'] }} select"
                hx-target="#tx-edit-{{ txn['id'] }}"
                hx-swap="outerHTML"><i class="bi bi-check-lg"></i></button>
        <button class="btn btn-secondary btn-sm py-0 px-1" title="Cancel"
                hx-get="{{ root_path }}/banks/transactions/{{ txn['id'] }}/cancel"
                hx-target="#tx-edit-{{ txn['id'] }}"
                hx-swap="outerHTML"><i class="bi bi-x-lg"></i></button>
        <input type="hidden" name="value_date" value="{{ txn['value_date'] }}">
    </td>
</tr>
