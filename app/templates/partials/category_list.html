<div id="hx-category-list">
    {% if categories %}
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Category</th>
                        <th scope="col">Type</th>
                        <th scope="col">Description</th>
                        <th scope="col" class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                {% for c in categories %}
                    <tr>
                        <td>
                            <span class="fw-semibold">{{ c["type"]|upper }}:{{ c["name"] }}</span>
                        </td>
                        <td>
                            <span class="badge badge-kuku-{{ c['type']|lower }} rounded-pill text-capitalize">{{ c["type"] }}</span>
                        </td>
                        <td class="small text-muted">{{ c["description"] or "—" }}</td>
                        <td class="text-end">
                            {% if c["is_system"] %}
                            <span class="badge bg-secondary-subtle text-secondary border"><i class="bi bi-lock-fill me-1"></i>System</span>
                            {% else %}
                            <div class="btn-group btn-group-sm" role="group">
                                    <button class="btn btn-outline-secondary"
                                            hx-get="{{ root_path }}/banks/categories/{{ c['id'] }}/edit"
                                            hx-target="#category-form-card"
                                            hx-swap="innerHTML">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-danger kuku-del-btn"
                                        data-url="{{ root_path }}/banks/categories/{{ c['id'] }}"
                                        data-check-url="{{ root_path }}/banks/categories/{{ c['id'] }}/check-delete"
                                        data-title="Delete Category"
                                        data-detail="{{ c['type'] }}:{{ c['name'] }}"
                                        data-target="#hx-category-list">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    {% else %}
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center text-muted py-5">
            <i class="bi bi-tags fs-1 d-block mb-2"></i>
            <p class="mb-0">No categories found.</p>
        </div>
    </div>
    {% endif %}
</div>
