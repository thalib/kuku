{% if no_data %}
<span class="small text-muted">No transactions uploaded.&nbsp;</span>
<button type="button" class="btn btn-sm btn-outline-primary" id="btnFilterImport"><i class="bi bi-upload me-1"></i>Upload</button>
{% else %}
<select id="selFy" class="form-select form-select-sm">
    {% for fy in fy_years %}
        <option value="{{ fy }}" {% if fy == selected_fy %}selected{% endif %}>FY {{ fy }}-{{ fy + 1 }}</option>
    {% endfor %}
</select>
<select id="selMonth" class="form-select form-select-sm">
    {% for m, label in months %}
        <option value="{{ m }}" {% if m == selected_month %}selected{% endif %}>{{ "%02d"|format(m) }} - {{ label }}</option>
    {% endfor %}
</select>
{% endif %}
