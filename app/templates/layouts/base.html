<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or "Kuku" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
    <style>
        :root { --kuku-sidebar-w: 248px; }
        body { overflow: hidden; }
        .app-navbar { position: sticky; top: 0; z-index: 1040; }
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .app-sidebar-wrap {
            width: var(--kuku-sidebar-w);
            flex-shrink: 0;
            transition: width 200ms ease;
            overflow: hidden;
            border: none;
        }
        .app-sidebar-wrap.closed { width: 0 !important; border: none !important; }
        .app-sidebar {
            width: var(--kuku-sidebar-w);
            height: 100%;
            flex-shrink: 0;
        }
        .app-sidebar-link { white-space: nowrap; }
        .app-content { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="d-flex flex-column vh-100">
        {% include "partials/navbar.html" %}
        <div class="app-body bg-light">
            {% include "partials/sidebar.html" %}
            <main class="app-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        (function(){
            var wrap = document.getElementById('sidebarWrap');
            var btn  = document.getElementById('sidebarToggle');
            if(!wrap||!btn) return;
            btn.addEventListener('click', function(){
                wrap.classList.toggle('closed');
                var isOpen = !wrap.classList.contains('closed');
                btn.innerHTML = isOpen
                    ? '<i class="bi fs-5 bi-layout-sidebar-inset-reverse"></i>'
                    : '<i class="bi fs-5 bi-layout-sidebar"></i>';
                btn.title = isOpen ? 'Hide sidebar' : 'Show sidebar';
            });
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
