<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or "Kuku" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --kuku-sidebar-width: 248px; }
        .kuku-shell { min-height: 100vh; }
        .kuku-sidebar-shell { width: var(--kuku-sidebar-width); transition: width .2s ease; overflow: hidden; }
        .kuku-sidebar-shell--collapsed { width: 0; border: none !important; }
        .app-sidebar { width: var(--kuku-sidebar-width); }
        .sidebar-link { white-space: nowrap; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="d-flex flex-column vh-100">
        {% include "partials/navbar.html" %}

        <div class="position-relative d-flex flex-grow-1 overflow-hidden bg-light">
            {% include "partials/sidebar.html" %}
            <main class="flex-grow-1 overflow-auto" id="kukuMain">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        const shell = document.getElementById('kukuSidebarShell');
        const btn = document.getElementById('kukuToggleBtn');
        function toggleSidebar() {
            shell.classList.toggle('kuku-sidebar-shell--collapsed');
            const expanded = !shell.classList.contains('kuku-sidebar-shell--collapsed');
            btn.innerHTML = expanded ? '<i class="bi fs-5 bi-layout-sidebar-inset-reverse"></i>' : '<i class="bi fs-5 bi-layout-sidebar"></i>';
            btn.title = expanded ? 'Hide sidebar' : 'Show sidebar';
        }
        btn.addEventListener('click', toggleSidebar);
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
