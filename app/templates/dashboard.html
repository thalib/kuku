<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    {# Navbar #}
    <nav class="navbar navbar-dark bg-dark px-3 py-2">
        <button class="btn btn-dark border-0 me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
            <i class="bi bi-list fs-5"></i>
        </button>
        <span class="navbar-brand d-flex align-items-center gap-2 mb-0">
            <i class="bi bi-star-fill"></i> {{ app_name }}
        </span>
        <span class="text-light ms-auto"><i class="bi bi-person-circle"></i> mohamed</span>
    </nav>

    {# Offcanvas Sidebar #}
    <div class="offcanvas offcanvas-start bg-dark text-light" tabindex="-1" id="sidebar">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title"><i class="bi bi-star-fill me-2"></i>{{ app_name }}</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-3">
            <ul class="nav flex-column">
                {% for item in nav_items %}
                <li class="nav-item mb-1">
                    <a class="nav-link {% if item.active %}bg-primary rounded text-white{% else %}text-light{% endif %}" href="{{ item.url }}">
                        <i class="bi {{ item.icon }} me-2"></i> {{ item.name }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    {# Main Content #}
    <main class="p-4">
        <div class="card border">
            <div class="card-body">
                <h4 class="card-title"><i class="bi bi-star-fill me-2"></i>{{ app_name }}</h4>
                <p class="text-muted mb-0">Welcome! Click the <i class="bi bi-list"></i> menu icon to navigate.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
