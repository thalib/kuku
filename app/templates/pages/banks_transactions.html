{% extends "layouts/base.html" %}

{% block content %}
<div class="container-fluid p-3 p-xl-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Transactions</h1>
        <div>
            <button class="btn btn-outline-primary btn-sm me-2" id="btnImport" disabled>
                <i class="bi bi-upload me-1"></i> Import
            </button>
            <span class="dropdown d-inline-block">
                <button class="btn btn-outline-primary btn-sm dropdown-toggle" data-bs-toggle="dropdown" id="btnExport" style="display:none">
                    <i class="bi bi-download me-1"></i> Export
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item small" id="expCSV" href="#"><i class="bi bi-filetype-csv me-1"></i> CSV</a></li>
                    <li><a class="dropdown-item small" id="expXLSX" href="#"><i class="bi bi-file-earmark-excel me-1"></i> Excel</a></li>
                    <li><a class="dropdown-item small" id="expPDF" href="#"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</a></li>
                </ul>
            </span>
        </div>
    </div>

    {% if accounts %}
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-2">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <select id="selAccount" name="account_id" class="form-select form-select-sm"
                            hx-get="/banks/transactions/filters"
                            hx-target="#hx-filters"
                            hx-trigger="change"
                            hx-swap="innerHTML">
                        <option value="">-- Select Account --</option>
                        {% for a in accounts %}
                        <option value="{{ a['id'] }}">{{ a["bank_name"] }} - ****{{ a["account_number"][-4:] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-auto d-flex gap-2 align-items-center" id="hx-filters"></div>
            </div>
        </div>
    </div>

    <div id="hx-import-alert"></div>
    <div id="hx-table-area"></div>

    <div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title mb-0" id="importModalLabel">Import Transactions</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="import-modal-body"></div>
            </div>
        </div>
    </div>

    {% else %}
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center text-muted py-5">
            <i class="bi bi-bank fs-1 d-block mb-2"></i>
            <p class="mb-0">No active bank accounts. Add one in <a href="/banks/manage">Manage</a> first.</p>
        </div>
    </div>
    {% endif %}
</div>

{% block extra_scripts %}
<script>
(function(){
    var importModal = null;

    function getFilters(){
        var sel = document.getElementById('selAccount');
        var yr = document.getElementById('selYear');
        var mo = document.getElementById('selMonth');
        return {
            account_id: sel ? sel.value : '',
            year: yr ? yr.value : '',
            month: mo ? mo.value : ''
        };
    }

    function loadTable(){
        var f = getFilters();
        if (!f.account_id || !f.year || !f.month) return;
        htmx.ajax('GET',
            '/banks/transactions/table?account_id='+f.account_id+'&year='+f.year+'&month='+f.month,
            '#hx-table-area');
        document.getElementById('btnExport').style.display = '';
        var base = '/banks/transactions/export/';
        var q = '?account_id='+f.account_id+'&year='+f.year+'&month='+f.month;
        document.getElementById('expCSV').href = base+'csv'+q;
        document.getElementById('expXLSX').href = base+'xlsx'+q;
        document.getElementById('expPDF').href = base+'pdf'+q;
    }

    document.addEventListener('change', function(e){
        if (e.target.id === 'selAccount'){
            var btn = document.getElementById('btnImport');
            if (btn) btn.disabled = !e.target.value;
        }
        if (e.target.id === 'selYear'){
            var sel = document.getElementById('selAccount');
            htmx.ajax('GET',
                '/banks/transactions/filters?account_id='+sel.value+'&selected_year='+e.target.value,
                '#hx-filters');
        }
        if (e.target.id === 'selMonth') loadTable();
    });

    document.addEventListener('htmx:afterSwap', function(e){
        if (e.detail.target.id === 'hx-filters') loadTable();
    });

    document.getElementById('btnImport').addEventListener('click', function(){
        if (!importModal) importModal = new bootstrap.Modal(document.getElementById('importModal'));
        var sel = document.getElementById('selAccount');
        if (!sel || !sel.value) return;
        var body = document.getElementById('import-modal-body');
        body.innerHTML = '<div class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm"></div> Loading…</div>';
        importModal.show();
        htmx.ajax('GET', '/banks/transactions/import/form?account_id='+sel.value, '#import-modal-body');
    });

    document.addEventListener('htmx:afterSwap', function(e){
        if (e.detail.target.id === 'import-modal-body'){
            var label = document.querySelector('#import-modal-body .modal-title-label');
            document.getElementById('importModalLabel').textContent =
                label ? label.textContent : 'Import Transactions';
        }
    });

    document.addEventListener('txImported', function(e){
        if (importModal) importModal.hide();
        var sel = document.getElementById('selAccount');
        if (!sel || !sel.value) return;
        var detail = (e.detail && e.detail.value) ? e.detail.value : {};
        var count = detail.count || '?';

        var alertDiv = document.getElementById('hx-import-alert');
        alertDiv.innerHTML =
            '<div class="alert alert-success py-2 small alert-dismissible fade show mb-3" role="alert">' +
            '<i class="bi bi-check-circle me-1"></i> ' + count + ' transactions imported successfully.' +
            '<button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button></div>';
        setTimeout(function(){ if (alertDiv.firstChild) alertDiv.firstChild.remove(); }, 5000);

        htmx.ajax('GET',
            '/banks/transactions/filters?account_id='+sel.value+
                (detail.year ? '&selected_year='+detail.year : '')+
                (detail.month ? '&selected_month='+detail.month : ''),
            '#hx-filters');
    });

    document.addEventListener('txDeleted', function(){ loadTable(); });
})();
</script>
{% endblock %}
{% endblock %}
